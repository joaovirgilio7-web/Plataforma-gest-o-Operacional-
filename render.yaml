services:
  - type: web
    name: plataforma-gestao-operacional
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: ./data
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 24

services:
  - type: web
    name: plataforma-praias
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 24
    disk:
      name: plataforma-praias-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

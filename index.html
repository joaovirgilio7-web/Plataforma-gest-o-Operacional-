    function initMap(){const map=L.map("map"); L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OpenStreetMap"}).addTo(map); const group=L.featureGroup().addTo(map), list=$("#list"), rows=new Map(), markers=new Map(); mapPoints.forEach((p,i)=>{const key="p"+i; const icon=L.divIcon({className:"custom-marker",html:`<span style="display:block;width:18px;height:18px;border-radius:50%;background:${p.color};border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.28)"></span>`,iconSize:[18,18],iconAnchor:[9,9]}); const label=p.entity||p.type; const m=L.marker([p.lat,p.lng],{icon}).addTo(group).bindPopup(`<strong>${p.name}</strong><br>${label}<br><small>Latitude: ${p.lat.toFixed(6)}<br>Longitude: ${p.lng.toFixed(6)}</small>`); const row=document.createElement("button"); row.className="map-row"; row.dataset.search=(p.name+" "+p.area+" "+p.type+" "+(p.entity||"")).toLowerCase(); row.dataset.filter=p.type; row.innerHTML=`<span class="dot" style="background:${p.color}">${i+1}</span><span><strong>${p.name}</strong><small>${label}</small></span>`; row.onclick=()=>{map.setView(m.getLatLng(),15);m.openPopup();rows.forEach(r=>r.classList.remove("active"));row.classList.add("active")}; list.appendChild(row); rows.set(key,row); markers.set(key,m)}); const applyFilters=()=>{const term=$("#search").value.toLowerCase().trim(), type=$("#typeFilter").value; const visible=L.featureGroup(); rows.forEach((row,key)=>{const typeMatch=!type||row.dataset.filter===type; const show=(!term||row.dataset.search.includes(term))&&typeMatch; row.style.display=show?"grid":"none"; const marker=markers.get(key); if(show){ if(!group.hasLayer(marker)) group.addLayer(marker); visible.addLayer(marker); } else if(group.hasLayer(marker)) group.removeLayer(marker); }); if(visible.getLayers().length) map.fitBounds(visible.getBounds().pad(.16));}; $("#fit").onclick=()=>{if(group.getLayers().length)map.fitBounds(group.getBounds().pad(.12))}; $("#search").oninput=applyFilters; $("#typeFilter").onchange=applyFilters; $("#clearFilters").onclick=()=>{$("#search").value="";$("#typeFilter").value="";applyFilters()}; map.fitBounds(group.getBounds().pad(.12));}

    function materialDanificado(){page("material",`<a class="button-link" href="#material">Voltar</a><h1>Material danificado</h1><form id="damagedForm" class="panel form"><section class="form-grid"><label>Data<input name="date" type="date" value="${today()}" required></label><label>Praia<select name="beachName">${options(beachOptions)}</select></label></section><label>Equipamento<select name="equipment" required>${damagedMaterialTypes.map(x=>`<option>${esc(x)}</option>`).join("")}</select></label><label>Fotografias opcionais<input name="photos" type="file" accept="image/*" multiple></label><button>Submeter</button></form>`); $("#damagedForm").onsubmit=async e=>{e.preventDefault(); const f=new FormData(e.target), btn=e.target.querySelector("button"); btn.disabled=true; btn.textContent="A submeter..."; const photos=await readPhotos(e.target.photos.files); state.damagedMaterial.unshift({id:id(),date:f.get("date"),beachName:f.get("beachName"),equipment:f.get("equipment"),photos,userName:user().name,createdAt:dt()}); save(); materialDanificado(); app.querySelector(".page").insertAdjacentHTML("afterbegin",'<div class="success">Material danificado submetido para o administrador.</div>')}}
    function selectedChecklist(type,vehicle="Carrinha"){const base=checklistTemplates[type]; if(type!=="viatura"||!base) return base; const items=vehicle==="Moto 4x4"?viaturaMotoItems:base.items; return {...base,label:`${base.label} - ${vehicle}`,items,vehicle};}
    function checklist(type="",vehicle="Carrinha"){const tpl=selectedChecklist(type,vehicle); page("checklist",`<a class="button-link" href="#material">Voltar</a><h1>Checklist</h1><section class="panel form"><label>Tipo de checklist<select id="checklistType"><option value="">Escolher checklist</option>${Object.entries(checklistTemplates).map(([k,t])=>`<option value="${k}" ${k===type?"selected":""}>${t.label}</option>`).join("")}</select></label></section>${tpl?checklistForm(type,tpl,vehicle):""}`); $("#checklistType").onchange=e=>checklist(e.target.value); const form=$("#checklistForm"); if(form){form.addEventListener("input",updateChecklistDots); form.onsubmit=e=>{e.preventDefault(); const f=new FormData(e.target); const items=tpl.items.map(([name,required])=>{const actual=Number(f.get("item_"+slug(name))||0); return {name,required,actual,missing:Math.max(0,required-actual)}}); state.materialRequests.unshift({id:id(),createdAt:dt(),date:f.get("date"),beachName:f.get("beachName"),type,label:tpl.label,userName:user().name,items}); save(); checklist(type,vehicle); app.querySelector(".page").insertAdjacentHTML("afterbegin",'<div class="success">Checklist submetida para o administrador.</div>')}; updateChecklistDots();}}
    function checklistForm(type,tpl,vehicle="Carrinha"){const target=type==="viatura"?`<label>Meio<select name="beachName" onchange="checklist('viatura',this.value)"><option ${vehicle==="Carrinha"?"selected":""}>Carrinha</option><option ${vehicle==="Moto 4x4"?"selected":""}>Moto 4x4</option></select></label>`:`<label>Praia<select name="beachName">${options(beachOptions)}</select></label>`; return`<form id="checklistForm" class="panel form"><section class="form-grid"><label>Data<input name="date" type="date" value="${today()}" required></label>${target}</section><section class="checklist-items">${tpl.items.map(([name,required])=>`<label class="checklist-row"><strong>${esc(name)}</strong><span>Necessário: ${required}</span><input type="number" min="0" step="1" name="item_${slug(name)}" data-required="${required}" value="${required}" required><span class="status-dot" style="--dot-color:#2e7d32">OK</span></label>`).join("")}</section><button>Submeter checklist</button></form>`}
    function slug(s){return String(s).normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/gi,"_").replace(/^_|_$/g,"").toLowerCase()}
    function updateChecklistDots(){document.querySelectorAll(".checklist-row").forEach(row=>{const input=row.querySelector("input"), dot=row.querySelector(".status-dot"), ok=Number(input.value||0)>=Number(input.dataset.required||0); dot.style.setProperty("--dot-color",ok?"#2e7d32":"#c62828"); dot.textContent=ok?"OK":"A menos";})}
    function options(arr,val=""){return arr.map(x=>`<option ${x===val?"selected":""}>${esc(x)}</option>`).join("")}
    function bandeiras(){page("bandeiras",`<h1>Bandeiras</h1><form id="flagForm" class="panel form"><label>Data e hora<input name="dateTime" type="datetime-local" value="${dt()}" required></label><label>Praia<select name="beachName">${options(beachOptions)}</select></label><fieldset class="flag-field"><legend>Bandeira</legend>${flagTypes.map(f=>`<label class="flag-choice"><input type="radio" name="flag" value="${f.value}" required><span>${f.label}</span></label>`).join("")}</fieldset><button>Submeter</button></form>`); $("#flagForm").onsubmit=e=>{e.preventDefault(); const f=new FormData(e.target); state.flags.push({id:id(),dateTime:f.get("dateTime"),beachName:f.get("beachName"),flag:f.get("flag"),userName:user().name}); save(); bandeiras(); app.querySelector(".page").insertAdjacentHTML("afterbegin",'<div class="success">Registo submetido.</div>')}}
    function ocorrencias(){page("ocorrencias",`<h1>Ocorrências</h1><form id="occForm" class="panel form"><section class="form-grid"><label>Data e hora<input name="dateTime" type="datetime-local" value="${dt()}" required></label><label>Praia<select name="beachName">${options(beachOptions)}</select></label></section><fieldset class="flag-field"><legend>Tipo</legend>${occurrenceTypes.map(o=>`<label class="flag-choice"><input type="radio" name="occurrenceType" value="${o.value}" required><span>${o.label}</span></label>`).join("")}</fieldset>${checks("small",smallTypes,"Pequenas ocorrências")}${checks("means",meansTypes,"Meios no local")}${checks("entities",entityTypes,"Entidades externas")}<label>Descrição<textarea name="description" required></textarea></label><label>Fotografias opcionais<input name="photos" type="file" accept="image/*" multiple></label><label>PDF opcional<input type="file" accept=".pdf,application/pdf"></label><button>Submeter</button></form>`); $("#occForm").onsubmit=async e=>{e.preventDefault(); const f=new FormData(e.target), btn=e.target.querySelector("button"); btn.disabled=true; btn.textContent="A submeter..."; const photos=await readPhotos(e.target.photos.files); state.occurrences.push({id:id(),dateTime:f.get("dateTime"),beachName:f.get("beachName"),occurrenceType:f.get("occurrenceType"),small:f.getAll("small"),means:f.getAll("means"),entities:f.getAll("entities"),description:f.get("description"),photos,userName:user().name}); save(); ocorrencias(); app.querySelector(".page").insertAdjacentHTML("afterbegin",'<div class="success">Ocorrência submetida.</div>')}}
    function readPhotos(files){return Promise.all([...files].filter(file=>file.type.startsWith("image/")).map(file=>new Promise(resolve=>{const reader=new FileReader(); reader.onload=()=>resolve({name:file.name,type:file.type,data:reader.result}); reader.onerror=()=>resolve(null); reader.readAsDataURL(file)}))).then(items=>items.filter(Boolean))}
    function checks(name,arr,legend){return`<fieldset class="check-grid"><legend>${legend}</legend>${arr.map(x=>`<label class="check-choice"><input type="checkbox" name="${name}" value="${esc(x)}"><span>${esc(x)}</span></label>`).join("")}</fieldset>`}
    function pie(title,total,types,counts){let s=0,grad=types.map(t=>{let e=s+(total?(counts[t.value]||0)/total*100:0),r=`${t.color} ${s}% ${e}%`;s=e;return r}).join(",");return`<section class="pie-panel"><div><h2>${title}</h2><p>${total} registos.</p></div><div class="pie-wrap"><div class="pie" style="background:${total?`conic-gradient(${grad})`:"#e7eef0"}"></div><div class="pie-legend">${types.map(t=>`<span><i style="background:${t.color}"></i>${t.label}: <strong>${total?Math.round((counts[t.value]||0)/total*100):0}%</strong></span>`).join("")}</div></div></section>`}
    function bars(row,types){return`<article class="analysis-card"><div class="analysis-head"><h2>${esc(row.name)}</h2><span>${row.total} registos</span></div><div class="bar-stack">${types.map(t=>{let c=row.counts[t.value]||0,p=row.total?Math.round(c/row.total*100):0;return`<div class="bar-line"><div class="bar-label"><span>${t.label}</span><strong>${p}%</strong></div><div class="bar-track"><span style="width:${p}%;background:${t.color}"></span></div><small>${c} de ${row.total}</small></div>`}).join("")}</div></article>`}
    function dateRangeFilter(startKey,endKey,refresh){const start=localStorage.getItem(startKey)||today(), end=localStorage.getItem(endKey)||today(); return `<section class="panel form"><div class="form-grid"><label>Data inicial<input type="date" value="${start}" onchange="localStorage.setItem('${startKey}',this.value);${refresh}()"></label><label>Data final<input type="date" value="${end}" onchange="localStorage.setItem('${endKey}',this.value);${refresh}()"></label></div></section>`}
    function inDateRange(entry,start,end){const d=entry.dateTime?.slice(0,10); return d && d>=start && d<=end}
    function analiseBandeiras(){const start=localStorage.getItem("flagAnalysisStart")||today(), end=localStorage.getItem("flagAnalysisEnd")||today(), entries=state.flags.filter(f=>inDateRange(f,start,end)); const counts=Object.fromEntries(flagTypes.map(t=>[t.value,entries.filter(f=>f.flag===t.value).length])); const groups=beachOptions.map(b=>{let e=entries.filter(f=>f.beachName===b); return {name:b,total:e.length,counts:Object.fromEntries(flagTypes.map(t=>[t.value,e.filter(f=>f.flag===t.value).length]))}}).filter(x=>x.total); page("analise-bandeiras",`<h1>Análise bandeiras</h1>${dateRangeFilter("flagAnalysisStart","flagAnalysisEnd","analiseBandeiras")}${pie("Distribuição das bandeiras",entries.length,flagTypes,counts)}<section class="analysis-list">${groups.map(g=>bars(g,flagTypes)).join("")||'<article class="panel"><h2>Sem bandeiras registadas neste intervalo</h2></article>'}</section><section class="doc-list">${entries.map(f=>`<article class="doc-card"><div><h2>${f.beachName} · ${f.flag}</h2><p>${f.dateTime} · ${f.userName}</p></div><button class="danger" onclick="delFlag('${f.id}')">Eliminar</button></article>`).join("")}</section>`)}
    function analiseOcorrencias(){const start=localStorage.getItem("occAnalysisStart")||today(), end=localStorage.getItem("occAnalysisEnd")||today(), entries=state.occurrences.filter(o=>inDateRange(o,start,end)); const counts=Object.fromEntries(occurrenceTypes.map(t=>[t.value,entries.filter(o=>o.occurrenceType===t.value).length])); const groups=beachOptions.map(b=>{let e=entries.filter(o=>o.beachName===b); return {name:b,total:e.length,counts:Object.fromEntries(occurrenceTypes.map(t=>[t.value,e.filter(o=>o.occurrenceType===t.value).length]))}}).filter(x=>x.total); page("analise-ocorrencias",`<h1>Análise ocorrências</h1>${dateRangeFilter("occAnalysisStart","occAnalysisEnd","analiseOcorrencias")}${pie("Distribuição das ocorrências",entries.length,occurrenceTypes,counts)}<section class="analysis-list">${groups.map(g=>bars(g,occurrenceTypes)).join("")||'<article class="panel"><h2>Sem ocorrências registadas neste intervalo</h2></article>'}</section><section class="doc-list">${entries.map(o=>`<article class="doc-card"><div><h2>${o.beachName} · ${occurrenceTypes.find(t=>t.value===o.occurrenceType)?.label}</h2><p>${o.dateTime} · Meios: ${(o.means||[]).join(", ")||"Sem registo"}</p>${occPhotos(o.photos)}</div><button class="danger" onclick="delOcc('${o.id}')">Eliminar</button></article>`).join("")}</section>`)}
    function occPhotos(photos=[]){return photos.length?`<div class="photo-grid">${photos.map((p,i)=>`<a href="${p.data}" target="_blank" title="${esc(p.name||`Fotografia ${i+1}`)}"><img src="${p.data}" alt="${esc(p.name||`Fotografia ${i+1}`)}"></a>`).join("")}</div>`:""}
    function forum(){const todayFlags=state.flags.filter(f=>f.dateTime?.slice(0,10)===today()); const todayOcc=state.occurrences.filter(o=>o.dateTime?.slice(0,10)===today()); page("forum",`<h1>Fórum</h1><section class="forum-tabs"><a href="#formacao">Formação e treino</a><a href="#bandeiras-dia">Bandeiras</a><a href="#ocorrencias-dia">Ocorrências</a></section><section id="formacao" class="forum-section">${user().role==="admin"?`<form id="topicForm" class="panel form"><h2>Novo tópico</h2><label>Título<input name="title" required></label><label>Pergunta<textarea name="body" required></textarea></label><button>Publicar</button></form>`:""}<section class="forum-list">${state.forum.map(topic).join("")||'<article class="panel"><h2>Ainda sem tópicos</h2></article>'}</section></section><section id="bandeiras-dia" class="forum-section"><h2>Bandeiras de hoje</h2><section class="doc-list">${todayFlags.map(f=>`<article class="doc-card"><div><h2>${f.beachName}</h2><p>${f.dateTime} · Bandeira ${f.flag}</p></div></article>`).join("")||'<article class="panel"><h2>Sem bandeiras registadas hoje</h2></article>'}</section></section><section id="ocorrencias-dia" class="forum-section"><h2>Ocorrências de hoje</h2><section class="doc-list">${todayOcc.map(o=>`<article class="doc-card"><div><h2>${o.beachName} · ${occurrenceTypes.find(t=>t.value===o.occurrenceType)?.label}</h2><p>${o.dateTime} · ${esc(o.description)}</p></div></article>`).join("")||'<article class="panel"><h2>Sem ocorrências registadas hoje</h2></article>'}</section></section>`); const tf=$("#topicForm"); if(tf) tf.onsubmit=e=>{e.preventDefault(); const f=new FormData(e.target); state.forum.unshift({id:id(),title:f.get("title"),body:f.get("body"),userName:user().name,createdAt:dt(),replies:[]}); save(); forum();}; document.querySelectorAll("[data-reply]").forEach(form=>form.onsubmit=e=>{e.preventDefault(); const f=new FormData(e.target), t=state.forum.find(x=>x.id===form.dataset.reply); t.replies.push({body:f.get("body"),userName:user().name,createdAt:dt()}); save(); forum();});}
    function topic(t){return`<article class="forum-topic"><h2>${esc(t.title)}</h2><p class="muted">${esc(t.userName)} · ${t.createdAt}</p><p>${esc(t.body)}</p><div class="reply-list">${(t.replies||[]).map(r=>`<div class="reply"><strong>${esc(r.userName)}</strong><span>${r.createdAt}</span><p>${esc(r.body)}</p></div>`).join("")||'<p class="muted">Ainda sem respostas.</p>'}</div><form data-reply="${t.id}" class="reply-form"><label>Responder<textarea name="body" required></textarea></label><button>Responder</button></form></article>`}
    function materialFilterData(){const saved=localStorage.getItem("materialRequestFilter")||"", filter=saved==="frente"?"":saved; return {filter,filterLabels:{mala:"Checklist Mala de Primeiros Socorros",viatura:"Checklist Mala de Primeiros Socorros Viatura de Salvamento"}}}
    function requisicoesMaterial(){const all=(state.materialRequests||[]).filter(r=>r.type!=="frente"), deliveredAll=(state.materialDelivered||[]).filter(r=>r.type!=="frente"), damaged=state.damagedMaterial||[], {filter,filterLabels}=materialFilterData(), entries=filter?all.filter(r=>r.type===filter):all, deliveredEntries=filter?deliveredAll.filter(r=>r.type===filter):deliveredAll, showTotal=localStorage.getItem("materialShowTotal")==="1"; page("requisicoes-material",`<h1>Reposição de material e checklist</h1>${materialConsumptionPie("Consumo geral por material",all)}${materialDeliveredPie("Material entregue",deliveredAll)}<section class="panel form"><label>Filtrar por tipo de checklist<select onchange="localStorage.setItem('materialRequestFilter',this.value);requisicoesMaterial()"><option value="">Mostrar todas</option>${Object.entries(filterLabels).map(([k,v])=>`<option value="${k}" ${filter===k?"selected":""}>${v}</option>`).join("")}</select></label><label class="check-choice"><input type="checkbox" ${showTotal?"checked":""} onchange="localStorage.setItem('materialShowTotal',this.checked?'1':'0');requisicoesMaterial()"><span>Total</span></label><a class="button-link" href="#arquivo-material">Arquivo de entregues</a></section><section class="section-head compact-head"><h1>Material danificado</h1></section><section class="doc-list">${damaged.map(damagedMaterialCard).join("")||'<article class="panel"><h2>Sem material danificado submetido</h2></article>'}</section>${showTotal?totalMaterialList(entries):""}${filter?materialConsumptionPie(`Consumo por material - ${filterLabels[filter]}`,entries)+materialDeliveredPie(`Material entregue - ${filterLabels[filter]}`,deliveredEntries):""}<section class="section-head compact-head"><h1>Checklists pendentes</h1></section><section class="doc-list">${entries.map(req=>materialRequestCard(req)).join("")||'<article class="panel"><h2>Sem checklists neste filtro</h2></article>'}</section>`)}
    function totalMaterialList(entries){const counts={}; entries.forEach(req=>(req.items||[]).forEach(i=>{if(i.missing>0) counts[i.name]=(counts[i.name]||0)+i.missing})); const rows=Object.entries(counts).sort((a,b)=>a[0].localeCompare(b[0],"pt")); return`<section class="panel"><h2>Total para levantar no armazém</h2><p class="muted">Soma do material em falta nas checklists atualmente visíveis.</p>${rows.length?`<ul class="missing-list">${rows.map(([name,count])=>`<li><span>${esc(name)}</span><strong>${count}</strong></li>`).join("")}</ul>`:'<p class="success">Não existe material em falta neste filtro.</p>'}</section>`}
    function materialConsumptionPie(title,entries){const counts={}; entries.forEach(req=>(req.items||[]).forEach(i=>{if(i.missing>0) counts[i.name]=(counts[i.name]||0)+i.missing})); const rows=Object.entries(counts).sort((a,b)=>b[1]-a[1]), total=rows.reduce((s,x)=>s+x[1],0); let start=0, colors=rows.map((_,i)=>`hsl(${(i*47)%360} 68% 42%)`), grad=rows.map(([name,count],i)=>{const end=start+(total?count/total*100:0), part=`${colors[i]} ${start}% ${end}%`; start=end; return part}).join(","); return`<section class="pie-panel"><div><h2>${title}</h2><p>${total?`${total} unidades em falta.`:"Sem material em falta."}</p></div><div class="pie-wrap"><div class="pie" style="background:${total?`conic-gradient(${grad})`:"#e7eef0"}"></div><div class="pie-legend">${rows.map(([name,count],i)=>`<span><i style="background:${colors[i]}"></i>${esc(name)}: <strong>${count}</strong></span>`).join("")||'<span>Sem consumo registado.</span>'}</div></div></section>`}
    function materialDeliveredPie(title,entries){const counts={}; entries.forEach(req=>(req.items||[]).forEach(i=>{if(i.missing>0) counts[i.name]=(counts[i.name]||0)+i.missing})); const rows=Object.entries(counts).sort((a,b)=>b[1]-a[1]), total=rows.reduce((s,x)=>s+x[1],0); let start=0, colors=rows.map((_,i)=>`hsl(${(i*47+135)%360} 62% 40%)`), grad=rows.map(([name,count],i)=>{const end=start+(total?count/total*100:0), part=`${colors[i]} ${start}% ${end}%`; start=end; return part}).join(","); return`<section class="pie-panel"><div><h2>${title}</h2><p>${total?`${total} unidades entregues.`:"Sem material entregue."}</p></div><div class="pie-wrap"><div class="pie" style="background:${total?`conic-gradient(${grad})`:"#e7eef0"}"></div><div class="pie-legend">${rows.map(([name,count],i)=>`<span><i style="background:${colors[i]}"></i>${esc(name)}: <strong>${count}</strong></span>`).join("")||'<span>Sem entregas registadas.</span>'}</div></div></section>`}
    function prettyChecklistLabel(label){return String(label||"").replace(/^checklist/,"Checklist").replace("Mala Primeiros Socorros","Mala de Primeiros Socorros").replace("Viatura salvamento","Viatura de Salvamento")}
    function materialRequestCard(req){const missing=req.items.filter(i=>i.missing>0), ok=!missing.length; return`<article class="panel"><div class="analysis-head"><div><h2>${esc(req.beachName)} · ${esc(prettyChecklistLabel(req.label))}</h2><p class="muted">${esc(req.date)} · submetido por ${esc(req.userName)} · ${esc(req.createdAt)}</p></div><span class="status-pill" style="--pill-color:${ok?"#2e7d32":"#c62828"}">${ok?"Material OK":"Material em falta"}</span></div>${missing.length?`<h2>Material a levar</h2><ul class="missing-list">${missing.map(i=>`<li><span>${esc(i.name)}</span><strong>${i.missing}</strong></li>`).join("")}</ul>`:'<p class="success">Sem faltas nesta checklist.</p>'}<details class="details-panel"><summary>Ver checklist completa</summary><section class="doc-list">${req.items.map(i=>`<article class="doc-card"><div><h2>${esc(i.name)}</h2><p>Necessário: ${i.required} · Existente: ${i.actual} · Falta: ${i.missing}</p></div><span class="status-dot" style="--dot-color:${i.missing?"#c62828":"#2e7d32"}">${i.missing?"A menos":"OK"}</span></article>`).join("")}</section></details><div class="record-actions"><button onclick="deliverMaterialRequest('${req.id}')">Entregue</button><button class="danger" onclick="delMaterialRequest('${req.id}')">Eliminar</button></div></article>`}
    function damagedMaterialCard(d){return`<article class="panel"><div class="analysis-head"><div><h2>${esc(d.beachName)}</h2><p class="muted">${esc(d.date)} · submetido por ${esc(d.userName)} · ${esc(d.createdAt)}</p></div><span class="status-pill" style="--pill-color:#c62828">Danificado</span></div><section class="doc-card"><div><h2>Material danificado</h2><p>${esc(d.equipment)}</p></div></section>${occPhotos(d.photos)}<div class="record-actions"><button class="danger" onclick="delDamagedMaterial('${d.id}')">Eliminar</button></div></article>`}
    function arquivoMaterial(){const deliveredAll=(state.materialDelivered||[]).filter(r=>r.type!=="frente"), {filter,filterLabels}=materialFilterData(), entries=filter?deliveredAll.filter(r=>r.type===filter):deliveredAll; page("requisicoes-material",`<a class="button-link" href="#requisicoes-material">Voltar à análise</a><h1>Arquivo de requisições entregues</h1><section class="panel form"><label>Filtrar por tipo de checklist<select onchange="localStorage.setItem('materialRequestFilter',this.value);arquivoMaterial()"><option value="">Mostrar todas</option>${Object.entries(filterLabels).map(([k,v])=>`<option value="${k}" ${filter===k?"selected":""}>${v}</option>`).join("")}</select></label></section>${materialDeliveredPie("Material entregue no arquivo",entries)}<section class="doc-list">${entries.map(req=>deliveredMaterialCard(req)).join("")||'<article class="panel"><h2>Sem requisições entregues neste filtro</h2></article>'}</section>`)}
    function deliveredMaterialCard(req){return`<article class="panel"><div class="analysis-head"><div><h2>${esc(req.beachName)} · ${esc(prettyChecklistLabel(req.label))}</h2><p class="muted">${esc(req.date)} · entregue por ${esc(req.deliveredBy||"Administrador")} · ${esc(req.deliveredAt||"")}</p></div><span class="status-pill" style="--pill-color:#2e7d32">Entregue</span></div><h2>Material entregue</h2><ul class="missing-list">${(req.items||[]).filter(i=>i.missing>0).map(i=>`<li><span>${esc(i.name)}</span><strong>${i.missing}</strong></li>`).join("")||'<li><span>Sem material em falta</span><strong>0</strong></li>'}</ul><details class="details-panel"><summary>Ver checklist completa</summary><section class="doc-list">${(req.items||[]).map(i=>`<article class="doc-card"><div><h2>${esc(i.name)}</h2><p>Necessário: ${i.required} · Existente: ${i.actual} · Entregue: ${i.missing}</p></div></article>`).join("")}</section></details></article>`}
    function utilizadores(){page("utilizadores",`<h1>Utilizadores</h1><section class="split"><form id="userForm" class="panel form"><h2>Novo utilizador</h2><label>Nome<input name="name" required></label><label>Email<input name="email" type="email" required></label><label>Palavra-passe<input name="password" required></label><label>Perfil<select name="role"><option value="user">Utilizador</option><option value="admin">Administrador</option></select></label><button>Criar</button></form><section class="panel"><h2>Contas existentes</h2>${state.users.map(u=>`<p><strong>${esc(u.name)}</strong><br><span class="muted">${esc(u.email)} · ${u.role}</span></p>`).join("")}</section></section>`); $("#userForm").onsubmit=e=>{e.preventDefault(); const f=new FormData(e.target); state.users.push({id:id(),name:f.get("name"),email:f.get("email").toLowerCase(),pass:f.get("password"),role:f.get("role")}); save(); utilizadores();};}
    function delFlag(x){state.flags=state.flags.filter(f=>f.id!==x); save(); analiseBandeiras()} function delOcc(x){state.occurrences=state.occurrences.filter(o=>o.id!==x); save(); analiseOcorrencias()} function delMaterialRequest(x){state.materialRequests=state.materialRequests.filter(r=>r.id!==x); save(); requisicoesMaterial()} function delDamagedMaterial(x){state.damagedMaterial=state.damagedMaterial.filter(d=>d.id!==x); save(); requisicoesMaterial()} function deliverMaterialRequest(x){const req=state.materialRequests.find(r=>r.id===x); if(!req)return; state.materialRequests=state.materialRequests.filter(r=>r.id!==x); state.materialDelivered.unshift({...req,deliveredAt:dt(),deliveredBy:user().name}); save(); requisicoesMaterial()} function logout(){state.session=null; save(); location.hash=""; render()}
    render();
  </script>
</body>
</html>
